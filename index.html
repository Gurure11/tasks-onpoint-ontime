<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OnPoint Task System</title>
</head>
<body>

<h2>OnPoint Task System (External)</h2>

<div id="login">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3 id="user"></h3>
  <div id="tasks"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw86ri-48g-DQF_e_cJTG8hlgURI1jtsW690M4_kBGri-syrcaU2QvQDpNBQk3O4de2SQ/exec";

let currentUser = null;

// LOGIN
function login(){
  fetch(SCRIPT_URL + "?action=login&email=" 
    + document.getElementById("email").value 
    + "&password=" 
    + document.getElementById("password").value)
  .then(res => res.json())
  .then(data => {
    if(data){
      currentUser = data;
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("user").innerText = data.name + " ("+data.role+")";
      loadTasks();
    } else {
      alert("Invalid login");
    }
  });
}

// LOAD TASKS
function loadTasks(){
  fetch(SCRIPT_URL + "?action=getTasks&userId=" + currentUser.id + "&role=" + currentUser.role)
  .then(res => res.json())
  .then(tasks => {
    let html="";
    tasks.forEach(t=>{
      html += `
        <div>
          <b>${t.title}</b><br>
          Progress: ${t.progress}%<br>
          Status: ${t.status}<br>
        </div><hr>`;
    });
    document.getElementById("tasks").innerHTML = html;
  });
}
</script>

</body>
</html>
